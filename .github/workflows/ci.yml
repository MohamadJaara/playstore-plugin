name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli:
    name: CLI (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22
          - 24
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install CLI dependencies
        working-directory: cli
        run: npm ci

      - name: Typecheck CLI
        working-directory: cli
        run: npm run typecheck

      - name: Build CLI
        working-directory: cli
        run: npm run build

      - name: Test CLI
        working-directory: cli
        run: npm test

      - name: Run local doctor
        run: scripts/playstore doctor --format json
        env:
          GOOGLE_AUTH_USE_ADC: "true"
          PLAYSTORE_PACKAGE_ALLOWLIST: com.example.app
          PLAYSTORE_DEFAULT_PACKAGE: com.example.app

  plugin:
    name: Plugin manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate plugin manifest
        run: python3 scripts/validate-plugin-manifest.py
